services:
  postgres:
    image: postgres:16-alpine
    container_name: staylocal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: staylocal
      POSTGRES_PASSWORD: staylocal
      POSTGRES_DB: staylocal
    ports:
      # Por defecto expone en host:5432. Si ese puerto ya está ocupado
      # (otros postgres locales), exporta POSTGRES_PORT=5434 antes de
      # `docker compose up` y actualiza el DATABASE_URL del .env.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - staylocal_pgdata:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: staylocal-mail
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI web en http://localhost:8025

volumes:
  staylocal_pgdata:
